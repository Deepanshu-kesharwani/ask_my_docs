name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      PRIMARY_MODEL: openai/gpt-4o-mini
      FALLBACK_MODELS: '["mistralai/mistral-large"]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Run evaluation gate
        run: python -c "from app.evaluation.ragas_eval import run_ragas_eval; print(run_ragas_eval())"